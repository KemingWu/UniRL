# @package _global_
# HunyuanImage3 it2i (image editing) GRPO — trainside FSDP + RemoteRewardBackend (EditReward).
#
# Pure DiT editing mode: source image + editing instruction → diffusion-only generation.
# No AR stage — the text prompt is used directly as the editing instruction.
#
# 4-node deployment:
#   Node 0: EditReward service (1 GPU for 7B VLM scorer)
#   Node 1-3: HunyuanImage3 80B training (24 GPU FSDP + LoRA, activation checkpointing)
#
# The it2i mode reads primitives["image"] (source image) + primitives["text"] (editing
# instruction) and runs only the diffusion pipeline. This matches the dataset format
# where each sample has a condition image + editing prompt.

num_devices: 24               # 3 training nodes × 8 GPUs
batch_size: 6                 # prompts_per_rollout (small for 80B model)
num_rollouts: 10000

logging:
  report_to_wandb: true
  project_name: ${oc.env:WANDB_PROJECT,unirl-hi3-editreward}
  run_name: null
  entity: ${oc.env:WANDB_ENTITY,null}
  tags: [hi3, it2i, editreward, trainside, fsdp]
  log_media: true
  media_max_items: 4
  media_log_interval: 1

bundle:
  _target_: unirl.models.hunyuan_image3.bundle.HunyuanImage3Bundle.from_meta_config
  config:
    _target_: unirl.models.hunyuan_image3.config.HunyuanImage3PipelineConfig
    pretrained_model_ckpt_path: ${oc.env:PRETRAINED_MODEL,tencent/HunyuanImage-3.0-Instruct}
    model_precision: bf16
    autocast_precision: bf16
    trajectory_precision: fp16
    logprob_precision: fp32
    shift: 3.0
    guidance_scale: 1.0

pipeline:
  _target_: unirl.models.hunyuan_image3.pipeline.HunyuanImage3Pipeline.from_bundle
  config: ${bundle.config}
  strategy:
    _target_: unirl.sde.kernels.FlowSDEStrategy

backend:
  _target_: unirl.train.backend.fsdp.FSDPBackend
  block_class_names: ["HunyuanImage3DecoderLayer"]
  trainable_attr: transformer
  fsdp_cfg:
    _target_: unirl.train.configs.FSDPConfig
    param_dtype: bf16
    cpu_offload: false
    mixed_precision: true
    fsdp_mode: full
    reshard_after_forward: true
    activation_checkpointing: true
    use_torch_compile: false
  optimizer_cfg:
    _target_: unirl.train.backend.base.OptimizerConfig
    learning_rate: 5.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_epsilon: 1.0e-8
    weight_decay: 0.0
  scheduler_cfg:
    _target_: unirl.train.backend.base.LrSchedulerConfig
    type: constant
    warmup_steps: 0
    total_steps: 10000
  lora_cfg:
    _target_: unirl.train.configs.LoraConfig
    rank: 8
    alpha: 16
    dropout: 0.0
    bias: none
    task_type: FEATURE_EXTRACTION
    target_modules:
      - qkv_proj
      - o_proj

rollout:
  _target_: unirl.rollout.engine.trainside.engine.TrainsideRolloutEngine
  stage_attrs: [diffusion]
  forward_batch_size: 2

# Remote EditReward service (Node 0). 2-turn history (source + generated)
# is automatically built when primitives["image"] exists.
reward:
  _target_: unirl.reward.service.RewardService
  backend:
    _target_: unirl.reward.remote.RemoteRewardBackend
    base_device: cpu
    config:
      _target_: unirl.reward.remote.RemoteRewardSpec
      base_url: ${oc.env:REWARD_SERVICE_URL,http://localhost:8080}
      required_rewards: [editreward]
      reward_weights:
        editreward: 1.0
      batch_size: 4
      timeout: 300.0
      sub_metric_reduce: mean
      aggregation_method: weighted_sum

algorithm:
  _target_: unirl.algorithms.flowgrpo.FlowGRPO
  stage_attr: diffusion
  clip_range: 1.0e-4
  clip_schedule: constant
  old_logp_source: replay
  conditions_cls:
    _target_: hydra.utils.get_class
    path: unirl.models.hunyuan_image3.conditions.HunyuanImage3DiffusionConditions
  params: ${sampling}

stack:
  _target_: unirl.train.stack.TrainStack
  micro_batch_size: 1
  max_grad_norm: 1.0
  num_updates_per_batch: 1

# Task mode: it2i (image editing — reads primitives["image"] as condition)
stage_params:
  task: it2i

data_source:
  _target_: unirl.data.data_source.MultimodalRLDataSource
  args:
    run:
      data_path: datasets/image_edit/train.jsonl
      eval_data_path: datasets/image_edit/test.jsonl
      seed: 42
    algorithm:
      prompts_per_rollout: ${batch_size}

sampling:
  _target_: unirl.types.sampling.DiffusionSamplingParams
  num_inference_steps: 16
  guidance_scale: 1.0
  height: 1024
  width: 1024
  eta: 1.0
  samples_per_prompt: 4
  seed: 42
  init_same_noise: false
  autocast_precision: bf16
  trajectory_precision: fp16
  logprob_precision: fp32
  scheduler:
    _target_: unirl.utils.scheduler_utils.AllSDEScheduler
    num_timesteps: ${..num_inference_steps}
    num_sde_steps: 3
    timestep_fraction: [0, 0.5]
